<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <div>
      <h1>📈 Sales Analytics Dashboard</h1>
      <p id="header-date"></p>
    </div>
    <div class="live-dot">Live</div>
  </header>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All Time</button>
    <button class="filter-btn" onclick="setFilter('month',this)">This Month</button>
    <button class="filter-btn" onclick="setFilter('week',this)">This Week</button>
    <button class="filter-btn" onclick="setFilter('today',this)">Today</button>
  </div>

  <div class="kpis">
    <div class="kpi blue"><div class="label">Total Revenue</div><div class="value" id="kpi-revenue">₹0</div><div class="change" id="kpi-rev-change">— sales</div></div>
    <div class="kpi green"><div class="label">Total Sales</div><div class="value" id="kpi-sales">0</div><div class="change" id="kpi-avg">Avg ₹0</div></div>
    <div class="kpi purple"><div class="label">Top Category</div><div class="value" id="kpi-top-cat" style="font-size:1rem">—</div><div class="change" id="kpi-top-pct">—</div></div>
    <div class="kpi yellow"><div class="label">Best Product</div><div class="value" id="kpi-best-prod" style="font-size:0.85rem;margin-top:6px">—</div></div>
  </div>

  <div class="chart-card">
    <h2>📊 Monthly Revenue</h2>
    <div class="bar-chart" id="bar-chart"><div class="empty" style="width:100%">No data yet.</div></div>
  </div>

  <div class="donut-section">
    <h2>🍩 Category Split</h2>
    <div class="donut-wrap">
      <div class="donut-chart">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="38" fill="none" stroke="#1e2d44" stroke-width="18"/>
          <g id="donut-arcs"></g>
        </svg>
        <div class="donut-center"><div class="d-val" id="donut-total">₹0</div><div class="d-label">Total</div></div>
      </div>
      <div class="donut-legend" id="donut-legend"><div class="empty">No data.</div></div>
    </div>
  </div>

  <div class="add-card">
    <h2>➕ Add Sale</h2>
    <div class="form-grid">
      <div><input id="s-product" placeholder="Product name"/></div>
      <div><input id="s-amount" type="number" placeholder="Amount (₹)" min="0"/></div>
      <div>
        <select id="s-category">
          <option>Electronics</option><option>Clothing</option><option>Food &amp; Beverage</option>
          <option>Books</option><option>Sports</option><option>Home &amp; Decor</option><option>Other</option>
        </select>
      </div>
      <div><input id="s-date" type="date"/></div>
    </div>
    <button class="add-btn" onclick="addSale()">+ Add Sale</button>
  </div>

  <div class="recent-card">
    <h2>🧾 Recent Sales</h2>
    <div id="recent-sales"><div class="empty">No sales yet.</div></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
